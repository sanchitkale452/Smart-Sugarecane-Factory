{% extends 'base.html' %}

{% block title %}Password Reset Sent - Sugarcane Factory{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">Check Your Email</h4>
            </div>
            <div class="card-body">
                <p>If an account exists with the email you entered, you will receive a password reset link shortly.</p>
                <a class="btn btn-primary" href="{% url 'login' %}">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
